<html>
<head>
    <title>App Ciclo</title>
</head>
<body>

    <h1>App de Ciclo Menstrual</h1>

    <h2>Persona 3: Backend y Datos</h2>

    <ul>
        <li>Base de datos segura</li>
        <li>Algoritmo de predicción</li>
        <li>Seguridad (login y cifrado)</li>
        <li>Infraestructura en la nube</li>
    </ul>

    <h2>Calcular próximo periodo</h2>

<label>Último periodo:</label>
<input type="date" id="fecha">

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

<script>
function calcular() {
    let fecha = new Date(document.getElementById("fecha").value);
    fecha.setDate(fecha.getDate() + 28);

    document.getElementById("resultado").innerText =
        "Tu próximo periodo sería: " + fecha.toDateString();
}
</script>

    <h2>Login</h2>

<input type="text" placeholder="Usuario" id="user">
<input type="password" placeholder="Contraseña" id="pass">

<button onclick="login()">Entrar</button>

<p id="mensaje"></p>

<script>
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234") {
        document.getElementById("mensaje").innerText = "Acceso correcto";
    } else {
        document.getElementById("mensaje").innerText = "Error";
    }
}
</script>

    <style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #fbc2eb, #a6c1ee);
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #333;
}

h2 {
    color: #555;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: white;
    margin: 10px auto;
    padding: 10px;
    width: 60%;
    border-radius: 10px;
    box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
}

input {
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #ff4f91;
}

p {
    font-weight: bold;
    color: #333;
}
</style>

</body>
</html>
